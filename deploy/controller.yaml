apiVersion: v1
kind: Namespace
metadata:
  name: game-fleet-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: game-fleet-director-controller
  namespace: game-fleet-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-fleet-director-controller
  namespace: game-fleet-system
  labels:
    app: game-fleet-director
    component: controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app: game-fleet-director
      component: controller
  template:
    metadata:
      labels:
        app: game-fleet-director
        component: controller
    spec:
      serviceAccountName: game-fleet-director-controller
      containers:
        - name: controller
          image: registry.cn-beijing.aliyuncs.com/noneedtostudy/game-fleet-director-controller:v0.1.0
          imagePullPolicy: IfNotPresent
          # 若使用私有仓库，须配置 imagePullSecrets 或在 ServiceAccount 中挂载
          # imagePullSecrets:
          #   - name: acr-secret
          args:
            - --metrics-addr=:8081
            - --namespace=game-fleet-system
            - --resync-period=15s
            - --leader-elect=true
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          env:
            - name: GFD_NHW_ENDPOINT
              value: ""
            - name: GFD_NOTIFY_FEISHU_URL
              value: ""
            - name: GFD_NOTIFY_DINGTALK_URL
              value: ""
            - name: GFD_LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
